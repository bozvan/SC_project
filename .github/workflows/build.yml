name: Build SmartOrganizer for All Platforms

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write  # Разрешить создание релизов

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            artifact_name: SmartOrganizer-linux
          - os: windows-latest
            name: windows
            artifact_name: SmartOrganizer-windows
          - os: macos-latest
            name: macos
            artifact_name: SmartOrganizer-macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build application
        shell: bash  # Важно: явно указываем bash для всех ОС
        run: |
          echo "=== Building ${{ matrix.name }} version ==="
          
          # Базовая команда
          if [ "${{ matrix.name }}" == "windows" ]; then
            PYINSTALLER_CMD="pyinstaller --onefile --windowed --name ${{ matrix.artifact_name }}"
            SEPARATOR=";"
          else
            PYINSTALLER_CMD="pyinstaller --onefile --name ${{ matrix.artifact_name }}"
            SEPARATOR=":"
          fi
          
          # Добавляем только то что точно существует
          if [ -d "src/assets" ]; then
            PYINSTALLER_CMD="$PYINSTALLER_CMD --add-data src/assets${SEPARATOR}assets"
          fi
          
          if [ -d "src/ui" ]; then
            PYINSTALLER_CMD="$PYINSTALLER_CMD --add-data src/ui${SEPARATOR}ui"
          fi
          
          PYINSTALLER_CMD="$PYINSTALLER_CMD --hidden-import core --hidden-import gui --hidden-import widgets"
          PYINSTALLER_CMD="$PYINSTALLER_CMD src/main.py"
          
          echo "Command: $PYINSTALLER_CMD"
          $PYINSTALLER_CMD
          
          # Копируем DB и JSON файлы вручную
          echo "Copying additional files..."
          cp src/*.db dist/ 2>/dev/null || echo "No .db files to copy"
          cp src/*.json dist/ 2>/dev/null || echo "No .json files to copy"
          
          if [ "${{ matrix.name }}" == "linux" ]; then
            chmod +x dist/${{ matrix.artifact_name }}
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
          retention-days: 30

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            SmartOrganizer-linux/*
            SmartOrganizer-windows/*
            SmartOrganizer-macos/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}