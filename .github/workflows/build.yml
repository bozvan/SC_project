name: Build SmartOrganizer for All Platforms

on:
  push:
    tags: [ 'v*' ]  # Запускать при создании тегов (v1.0.0, v1.1.0 и т.д.)
  workflow_dispatch:  # Разрешить ручной запуск

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            artifact_name: SmartOrganizer-linux
          - os: windows-latest
            name: windows
            artifact_name: SmartOrganizer-windows
          - os: macos-latest
            name: macos
            artifact_name: SmartOrganizer-macos

    runs-on: ${{ matrix.os }}

    steps:
      # Шаг 1: Получить код из репозитория
      - name: Checkout code
        uses: actions/checkout@v4

      # Шаг 2: Установить Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Шаг 3: Установить зависимости
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      # Шаг 4: Сборка приложения
      - name: Build application
        run: |
          # Собираем список конкретных DB файлов
          DB_FILES=$(find src -name "*.db" -printf "%f " 2>/dev/null || echo "")
          JSON_FILES=$(find src -name "*.json" -printf "%f " 2>/dev/null || echo "")

          echo "Found DB files: $DB_FILES"
          echo "Found JSON files: $JSON_FILES"

          if [ "${{ matrix.name }}" == "windows" ]; then
            CMD="pyinstaller --onefile --windowed --name ${{ matrix.artifact_name }} --add-data src/assets;assets --add-data src/ui;ui"
            for file in $DB_FILES; do CMD="$CMD --add-data src/$file;."; done
            for file in $JSON_FILES; do CMD="$CMD --add-data src/$file;."; done
            CMD="$CMD --hidden-import core --hidden-import gui --hidden-import widgets src/main.py"
          else
            CMD="pyinstaller --onefile --name ${{ matrix.artifact_name }} --add-data src/assets:assets --add-data src/ui:ui"
            for file in $DB_FILES; do CMD="$CMD --add-data src/$file:."; done
            for file in $JSON_FILES; do CMD="$CMD --add-data src/$file:."; done
            CMD="$CMD --hidden-import core --hidden-import gui --hidden-import widgets src/main.py"
          fi

          echo "Running: $CMD"
          $CMD

          if [ "${{ matrix.name }}" == "linux" ]; then
            chmod +x dist/${{ matrix.artifact_name }}
          fi

      # Шаг 5: Загрузить артефакты
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
          retention-days: 30

  # Дополнительный job для создания релиза
  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            SmartOrganizer-linux/*
            SmartOrganizer-windows/*
            SmartOrganizer-macos/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}