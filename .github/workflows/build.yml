name: Build SmartOrganizer for All Platforms

on:
  push:
    tags: ['v*']  # Только при тегах v*
  workflow_dispatch:  # Ручной запуск

jobs:
  build:
    strategy:
      fail-fast: false  # Важно: не отменять другие jobs при ошибке одной
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            artifact_name: SmartOrganizer-linux
          - os: windows-latest
            name: windows
            artifact_name: SmartOrganizer-windows
          - os: macos-latest
            name: macos
            artifact_name: SmartOrganizer-macos

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if [ -f "src/requirements.txt" ]; then
          pip install -r src/requirements.txt
        else
          echo "requirements.txt not found, installing basic dependencies"
          pip install PyQt6
        fi

    - name: Debug - List files
      run: |
        echo "=== Project structure ==="
        find . -type f -name "*.py" | head -20
        echo "=== src directory ==="
        ls -la src/ || echo "src/ not found"
        echo "=== requirements.txt ==="
        cat src/requirements.txt || echo "requirements.txt not found"

    - name: Build application
      run: |
        echo "Building ${{ matrix.name }} version..."
        
        # Базовые параметры PyInstaller
        PYINSTALLER_CMD="pyinstaller --onefile --name ${{ matrix.artifact_name }}"
        
        # Параметры для разных ОС
        if [ "${{ matrix.name }}" == "windows" ]; then
          PYINSTALLER_CMD="$PYINSTALLER_CMD --windowed"
          DATA_SEPARATOR=";"
        else
          DATA_SEPARATOR=":"
        fi
        
        # Добавляем данные если папки существуют
        if [ -d "src/assets" ]; then
          PYINSTALLER_CMD="$PYINSTALLER_CMD --add-data src/assets${DATA_SEPARATOR}assets"
        fi
        
        if [ -d "src/ui" ]; then
          PYINSTALLER_CMD="$PYINSTALLER_CMD --add-data src/ui${DATA_SEPARATOR}ui"
        fi
        
        # Добавляем основные файлы
        PYINSTALLER_CMD="$PYINSTALLER_CMD --add-data src/*.db${DATA_SEPARATOR}."
        PYINSTALLER_CMD="$PYINSTALLER_CMD --add-data src/*.json${DATA_SEPARATOR}."
        
        # Скрытые импорты
        PYINSTALLER_CMD="$PYINSTALLER_CMD --hidden-import core --hidden-import gui --hidden-import widgets"
        
        # Основной файл
        PYINSTALLER_CMD="$PYINSTALLER_CMD src/main.py"
        
        echo "Command: $PYINSTALLER_CMD"
        $PYINSTALLER_CMD
        
        # Для Linux даем права на выполнение
        if [ "${{ matrix.name }}" == "linux" ]; then
          chmod +x dist/${{ matrix.artifact_name }}
        fi
        
        echo "Build completed for ${{ matrix.name }}"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/
        retention-days: 30