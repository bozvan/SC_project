name: Build SmartOrganizer for All Platforms

on:
  push:
    tags: [ 'v*' ]  # Запускать при создании тегов (v1.0.0, v1.1.0 и т.д.)
  workflow_dispatch:  # Разрешить ручной запуск

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            artifact_name: SmartOrganizer-linux
          - os: windows-latest
            name: windows
            artifact_name: SmartOrganizer-windows
          - os: macos-latest
            name: macos
            artifact_name: SmartOrganizer-macos

    runs-on: ${{ matrix.os }}

    steps:
      # Шаг 1: Получить код из репозитория
      - name: Checkout code
        uses: actions/checkout@v4

      # Шаг 2: Установить Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Шаг 3: Установить зависимости
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r src/requirements.txt

      # Шаг 4: Сборка приложения
      - name: Build application
        run: |
          if [ "${{ matrix.name }}" == "windows" ]; then
            echo "Building Windows version..."
            pyinstaller --onefile --windowed --name ${{ matrix.artifact_name }} --add-data "src/assets;assets" --add-data "src/ui;ui" --add-data "src/*.db;." --hidden-import core --hidden-import gui --hidden-import widgets src/main.py
          elif [ "${{ matrix.name }}" == "linux" ]; then
            echo "Building Linux version..."
            pyinstaller --onefile --name ${{ matrix.artifact_name }} --add-data "src/assets:assets" --add-data "src/ui:ui" --add-data "src/*.db:." --hidden-import core --hidden-import gui --hidden-import widgets src/main.py
            chmod +x dist/${{ matrix.artifact_name }}
          elif [ "${{ matrix.name }}" == "macos" ]; then
            echo "Building macOS version..."
            pyinstaller --onefile --windowed --name ${{ matrix.artifact_name }} --add-data "src/assets:assets" --add-data "src/ui:ui" --add-data "src/*.db:." --hidden-import core --hidden-import gui --hidden-import widgets src/main.py
          fi

      # Шаг 5: Загрузить артефакты
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
          retention-days: 30

  # Дополнительный job для создания релиза
  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            SmartOrganizer-linux/*
            SmartOrganizer-windows/*
            SmartOrganizer-macos/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}